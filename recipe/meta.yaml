{% set name = "hpack" %}
{% set version = "4.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  #url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  #sha256: ec5eca154f7056aa06f196a557655c5b009b382873ac8d1e66e79e87535f1dca
  url: https://github.com/python-hyper/hpack/archive/refs/tags/v4.1.0.tar.gz
  sha256: d8e08ec703362fab42224f31e3eee0a73b8c6a28e1f05c1318feb2c54453abcf

build:
  skip: true  # [py<39]
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel >=0.45.0,<1
  run:
    - python

test:
  imports:
    - hpack
  source_files:
    - tests
  requires:
    - python
    - pip
    - pytest >=8.3.3,<9
    - hypothesis >=6.119.4,<7
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv tests

about:
  home: http://python-hyper.org/hpack/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: HTTP/2 Header Encoding for Python
  dev_url: https://github.com/python-hyper/hpack

extra:
  recipe-maintainers:
    - primozgodec
    - astaric
